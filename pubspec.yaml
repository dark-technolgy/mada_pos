name: mada_pos
description: "Mada Smart Sales Management System - نظام مدى الذكي لإدارة المبيعات"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # UI & Theme
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17

  # Icons
  cupertino_icons: ^1.0.8

  # Charts
  fl_chart: ^0.70.2

  # PDF & Printing
  pdf: ^3.11.2
  printing: ^5.13.4

  # Barcode
  barcode: ^2.2.8
  barcode_widget: ^2.0.4

  # Excel
  excel: ^4.0.6

  # Security
  pointycastle: ^3.9.1
  crypto: ^3.0.6

  # Date & Time
  intl: ^0.20.2

  # File Picker
  file_picker: ^8.1.7

  # Window Management
  window_manager: ^0.4.3

  # Collection utilities
  collection: ^1.19.1

  # Cloud & Auth
  supabase_flutter: ^2.8.1
  package_info_plus: ^8.0.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
