name: Build Windows

permissions:
  contents: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath mada-pos-windows.zip -Force

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mada-pos-windows
          path: mada-pos-windows.zip
          retention-days: 30

      - name: Publish Windows zip to release
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "windows-build-latest"
          $title = "Windows Build (Latest)"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag mada-pos-windows.zip --repo $env:GITHUB_REPOSITORY --title $title --notes "Automated Windows build from GitHub Actions."
          } else {
            gh release upload $tag mada-pos-windows.zip --repo $env:GITHUB_REPOSITORY --clobber
          }
